name: Verify

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:

permissions:
  contents: read

jobs:
  unit-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: gradle

      - name: Set up Android SDK (NDK 30.0.14904198)
        uses: android-actions/setup-android@v3
        with:
          ndk-version: 30.0.14904198

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Verify JVM test suite
        run: ./gradlew testDebugUnitTest
