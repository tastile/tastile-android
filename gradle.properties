android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Xshare:off
kotlin.daemon.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8 -Xshare:off
android.jdk.image.transformation.enabled=false
android.experimental.jdk.image.transformation.enabled=false
android.disallowKotlinSourceSets=false
kotlin.incremental.useClasspathSnapshot=false

# JDK 17 pin — needed for AGP 9.x; see MEMORY.md.
# Note: colons are escaped (\:) for lint PropertyEscape; Gradle itself parses
# both the escaped and unescaped forms, so the resolved path is unchanged.
org.gradle.java.home=C\:/Program Files/Microsoft/jdk-17.0.14.7-hotspot

