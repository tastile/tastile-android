android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.warning.mode=none

# Publishable mobile client configuration mirrored from the shared Tastile backend.
# Secrets (GOOGLE_WEB_CLIENT_ID,
# RELEASE_STORE_FILE, RELEASE_STORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD)
# must NOT be committed. Provide them via one of:
#   - local.properties (gitignored; template: local.properties.example)
#   - ~/.gradle/gradle.properties (user-global)
#   - GitHub Secrets (CI)
# GOOGLE_WEB_CLIENT_ID=  (set via local.properties or ~/.gradle/gradle.properties)
